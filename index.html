<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch cá nhân</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    background: #f5f6fa;
    text-align: center;
  }

  .calendar {
    width: 100%;
    max-width: 500px;
    margin: auto;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  select {
    padding: 8px;
    margin: 10px 0;
    font-size: 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: #2f3542;
    color: white;
    padding: 10px;
  }

  td {
    width: 14.28%;
    height: 60px;
    cursor: pointer;
    position: relative;
  }

  td:hover {
    background: #f1f2f6;
  }

  /* BIG X */
  .marked::after {
    content: "X";
    color: red;
    font-size: 28px;
    font-weight: bold;
    position: absolute;
    top: 5px;
    right: 8px;
  }

  .today {
    background: #dfe4ff;
  }

  .other-month {
    color: #b2bec3;
  }
</style>
</head>

<body>

<div class="calendar">

  <h2 id="monthYear"></h2>

  <!-- 👇 Dropdown for people -->
  <select id="personSelect">
    <option value="person1">Person 1</option>
    <option value="person2">Person 2</option>
  </select>

  <table>
    <thead>
      <tr>
        <th>CN</th><th>T2</th><th>T3</th><th>T4</th>
        <th>T5</th><th>T6</th><th>T7</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>
</div>

<script>
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const todayDate = today.getDate();

  const monthNames = [
    "Tháng 1","Tháng 2","Tháng 3","Tháng 4",
    "Tháng 5","Tháng 6","Tháng 7","Tháng 8",
    "Tháng 9","Tháng 10","Tháng 11","Tháng 12"
  ];

  document.getElementById("monthYear").innerText =
    `${monthNames[month]} ${year}`;

  let currentPerson = document.getElementById("personSelect").value;

  document.getElementById("personSelect").addEventListener("change", (e) => {
    currentPerson = e.target.value;
    generateCalendar(year, month);
  });

  function getKey(day) {
    return `${currentPerson}-${year}-${month}-${day}`;
  }

  function generateCalendar(year, month) {
    const tbody = document.getElementById("calendarBody");
    tbody.innerHTML = "";

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const prevMonthDays = new Date(year, month, 0).getDate();

    let row = document.createElement("tr");

    // previous month days
    for (let i = firstDay - 1; i >= 0; i--) {
      const cell = document.createElement("td");
      cell.innerText = prevMonthDays - i;
      cell.classList.add("other-month");
      row.appendChild(cell);
    }

    // current month
    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement("td");
      cell.innerText = day;

      const key = getKey(day);

      if (localStorage.getItem(key) === "X") {
        cell.classList.add("marked");
      }

      if (day === todayDate) {
        cell.classList.add("today");
      }

      cell.addEventListener("click", () => {
        if (cell.classList.contains("marked")) {
          cell.classList.remove("marked");
          localStorage.removeItem(key);
        } else {
          cell.classList.add("marked");
          localStorage.setItem(key, "X");
        }
      });

      row.appendChild(cell);

      if ((firstDay + day) % 7 === 0) {
        tbody.appendChild(row);
        row = document.createElement("tr");
      }
    }

    tbody.appendChild(row);
  }

  generateCalendar(year, month);
</script>

</body>
</html>
