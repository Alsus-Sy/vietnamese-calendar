<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch cá nhân</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    background: #f5f6fa;
    text-align: center;
  }

  .calendar {
    width: 100%;
    max-width: 500px;
    margin: auto;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  select {
    padding: 8px;
    margin: 10px 0;
    font-size: 16px;
  }

  .toolbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
  }

  .tool {
    padding: 10px 14px;
    border-radius: 10px;
    background: #dfe4ea;
    cursor: pointer;
    font-size: 18px;
    user-select: none;
  }

  .tool.active {
    background: #2f3542;
    color: white;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: #2f3542;
    color: white;
    padding: 10px;
  }

  td {
    width: 14.28%;
    height: 70px;
    position: relative;
    cursor: pointer;
    border: 1px solid #f1f2f6;
    vertical-align: top;
  }

  .day-number {
    font-size: 14px;
    margin-top: 4px;
    display: block;
  }

  /* X mark */
  .marked::after {
    content: "✖";
    color: red;
    font-size: 26px;
    font-weight: bold;
    position: absolute;
    top: 18px;
    right: 8px;
  }

  /* strike line */
  .striked {
    background: repeating-linear-gradient(
      135deg,
      transparent,
      transparent 6px,
      rgba(0,0,0,0.15) 6px,
      rgba(0,0,0,0.15) 8px
    );
  }

  .striked::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: red;
  }

  .today {
    background: #dfe4ff;
  }

  /* previous/next month days */
  .other-month {
    color: #b2bec3;
    background: #fafafa;
  }
</style>
</head>

<body>

<div class="calendar">

  <h2 id="monthYear"></h2>

  <select id="personSelect">
    <option value="person1">Bon / Duyen</option>
    <option value="person2">Xiu</option>
  </select>

  <div class="toolbar">
    <div class="tool active" id="xTool">✖</div>
    <div class="tool" id="strikeTool">〰</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>CN</th><th>T2</th><th>T3</th><th>T4</th>
        <th>T5</th><th>T6</th><th>T7</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>
</div>

<script>
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const todayDate = today.getDate();

  const monthNames = [
    "Tháng 1","Tháng 2","Tháng 3","Tháng 4",
    "Tháng 5","Tháng 6","Tháng 7","Tháng 8",
    "Tháng 9","Tháng 10","Tháng 11","Tháng 12"
  ];

  document.getElementById("monthYear").innerText =
    `${monthNames[month]} ${year}`;

  let currentPerson = document.getElementById("personSelect").value;
  let selectedTool = "x";

  document.getElementById("personSelect").addEventListener("change", (e) => {
    currentPerson = e.target.value;
    generateCalendar(year, month);
  });

  document.getElementById("xTool").onclick = () => setTool("x");
  document.getElementById("strikeTool").onclick = () => setTool("strike");

  function setTool(tool) {
    selectedTool = tool;
    document.querySelectorAll(".tool").forEach(t => t.classList.remove("active"));

    if (tool === "x") document.getElementById("xTool").classList.add("active");
    if (tool === "strike") document.getElementById("strikeTool").classList.add("active");
  }

  function getKey(y, m, d) {
    return `${currentPerson}-${y}-${m}-${d}`;
  }

  function getState(y, m, d) {
    const data = localStorage.getItem(getKey(y, m, d));
    return data ? JSON.parse(data) : { x: false, strike: false };
  }

  function saveState(y, m, d, state) {
    localStorage.setItem(getKey(y, m, d), JSON.stringify(state));
  }

  function handleClick(y, m, d, cell) {
    const state = getState(y, m, d);

    if (selectedTool === "x") {
      state.x = !state.x;
    }

    if (selectedTool === "strike") {
      state.strike = !state.strike;
    }

    saveState(y, m, d, state);
    generateCalendar(year, month);
  }

  function generateCalendar(year, month) {
    const tbody = document.getElementById("calendarBody");
    tbody.innerHTML = "";

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const prevMonthDays = new Date(year, month, 0).getDate();

    let row = document.createElement("tr");

    // previous month days (NOW CLICKABLE)
    const prevYear = month === 0 ? year - 1 : year;
    const prevMonth = month === 0 ? 11 : month - 1;

    for (let i = firstDay - 1; i >= 0; i--) {
      const day = prevMonthDays - i;

      const cell = document.createElement("td");
      cell.classList.add("other-month");

      const state = getState(prevYear, prevMonth, day);

      if (state.x) cell.classList.add("marked");
      if (state.strike) cell.classList.add("striked");

      cell.innerHTML = `<span class="day-number">${day}</span>`;

      cell.addEventListener("click", () => {
        handleClick(prevYear, prevMonth, day, cell);
      });

      row.appendChild(cell);
    }

    // current month
    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement("td");

      const state = getState(year, month, day);

      if (state.x) cell.classList.add("marked");
      if (state.strike) cell.classList.add("striked");
      if (day === todayDate) cell.classList.add("today");

      cell.innerHTML = `<span class="day-number">${day}</span>`;

      cell.addEventListener("click", () => {
        handleClick(year, month, day, cell);
      });

      row.appendChild(cell);

      if ((firstDay + day) % 7 === 0) {
        tbody.appendChild(row);
        row = document.createElement("tr");
      }
    }

    tbody.appendChild(row);
  }

  generateCalendar(year, month);
</script>

</body>
</html>
